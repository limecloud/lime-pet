<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Lime Pet Live2D Runtime</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
      }

      #stage {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #live2d-canvas {
        width: 100%;
        height: 100%;
        background: transparent;
      }

      #status {
        position: absolute;
        inset: auto 8px 8px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(12, 20, 17, 0.72);
        color: rgba(244, 255, 248, 0.94);
        font: 11px/1.4 "SF Pro Text", "PingFang SC", sans-serif;
        opacity: 0;
        transform: translateY(4px);
        transition:
          opacity 140ms ease,
          transform 160ms ease;
        pointer-events: none;
      }

      #status.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="live2d-canvas"></canvas>
      <div id="status" aria-live="polite"></div>
    </div>

    <script>
      async function loadScript(candidates) {
        for (const candidate of candidates) {
          try {
            await new Promise((resolve, reject) => {
              const script = document.createElement("script");
              script.src = candidate;
              script.async = false;
              script.onload = resolve;
              script.onerror = () => {
                script.remove();
                reject(new Error(candidate));
              };
              document.body.appendChild(script);
            });
            return;
          } catch (error) {
            console.warn("[LimePetLive2D] Failed to load script", candidate, error);
          }
        }

        throw new Error(`Missing runtime asset: ${candidates.join(", ")}`);
      }

      (async () => {
        try {
          await loadScript(["./vendor/pixi.min.js", "./pixi.min.js"]);
          await loadScript(["./vendor/live2dcubismcore.min.js", "./live2dcubismcore.min.js"]);
          await loadScript(["./vendor/pixi-live2d-cubism4.min.js", "./pixi-live2d-cubism4.min.js"]);
          await loadScript(["./runtime.js"]);
        } catch (error) {
          const status = document.getElementById("status");
          if (status) {
            status.textContent = "Live2D 运行时加载失败";
            status.classList.add("visible");
          }
          console.error("[LimePetLive2D] Failed to bootstrap runtime", error);
        }
      })();
    </script>
  </body>
</html>
